{% extends "base.html" %}
{% block title %}Deck Form • Between Us{% endblock %}

{% block body %}
<div class="max-w-3xl mx-auto p-6">
  <a href="{{ url_for('admin_web.decks') }}" class="text-white/50 text-sm">← Back to Decks</a>

  <div class="rounded-3xl bg-white/10 border border-white/10 p-8 mt-6">
    <h1 class="text-4xl font-bold mb-6">
      {% if deck %}Edit Deck{% else %}New Deck{% endif %}
    </h1>

    <form method="post" class="space-y-5">
      <div>
        <label class="block text-sm font-bold text-white/70 mb-2">ID / Slug</label>
        <input name="id" value="{{ deck.id if deck else '' }}" {% if deck %}readonly{% endif %} required
          placeholder="deep-conversations"
          class="w-full rounded-2xl bg-black/30 border border-white/10 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-400">
      </div>

      <div>
        <label class="block text-sm font-bold text-white/70 mb-2">Name</label>
        <input name="name" value="{{ deck.name if deck else '' }}" required
          class="w-full rounded-2xl bg-black/30 border border-white/10 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-400">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-bold text-white/70 mb-2">Emoji</label>
          <input name="emoji" value="{{ deck.emoji if deck else '' }}" required
            class="w-full rounded-2xl bg-black/30 border border-white/10 px-4 py-3">
        </div>

        <div>
          <label class="block text-sm font-bold text-white/70 mb-2">Sort Order</label>
          <input name="sort_order" type="number" value="{{ deck.sort_order if deck else 0 }}"
            class="w-full rounded-2xl bg-black/30 border border-white/10 px-4 py-3">
        </div>

        <div>
          <label class="block text-sm font-bold text-white/70 mb-2">Primary Color</label>
          <input name="primary_color" value="{{ deck.primary_color if deck else '#314755' }}"
            class="w-full rounded-2xl bg-black/30 border border-white/10 px-4 py-3">
        </div>

        <div>
          <label class="block text-sm font-bold text-white/70 mb-2">Secondary Color</label>
          <input name="secondary_color" value="{{ deck.secondary_color if deck else '#26A0DA' }}"
            class="w-full rounded-2xl bg-black/30 border border-white/10 px-4 py-3">
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold text-white/70 mb-2">Description</label>
        <textarea name="description" rows="4"
          class="w-full rounded-2xl bg-black/30 border border-white/10 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-400">{{ deck.description if deck else '' }}</textarea>
      </div>

      <div class="flex gap-6">
        <label class="flex items-center gap-2">
          <input type="checkbox" name="is_nsfw" {% if deck and deck.is_nsfw %}checked{% endif %}>
          NSFW
        </label>

        {% if deck %}
        <label class="flex items-center gap-2">
          <input type="checkbox" name="is_active" {% if deck.is_active %}checked{% endif %}>
          Active
        </label>
        {% endif %}
      </div>

      <button class="rounded-2xl bg-gradient-to-r from-pink-500 to-purple-500 px-6 py-3 font-bold">
        Save Deck
      </button>
    </form>
  </div>
</div>
{% endblock %}
