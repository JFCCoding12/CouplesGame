{% extends "base.html" %}
{% block title %}Login • Between Us{% endblock %}

{% block body %}
<main class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md rounded-3xl bg-white/10 border border-white/10 p-8 shadow-2xl backdrop-blur">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">❤️</div>
      <h1 class="text-4xl font-bold">Between Us</h1>
      <p class="text-white/60 mt-2">Admin Login</p>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="mb-4 rounded-2xl bg-red-500/20 border border-red-400/20 p-4 text-sm">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('web.login_post') }}" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-white/70 mb-2">Email</label>
        <input name="email" type="email" required
          class="w-full rounded-2xl bg-black/30 border border-white/10 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-400">
      </div>

      <div>
        <label class="block text-sm font-semibold text-white/70 mb-2">Password</label>
        <input name="password" type="password" required
          class="w-full rounded-2xl bg-black/30 border border-white/10 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-400">
      </div>

      <button class="w-full rounded-2xl bg-gradient-to-r from-pink-500 to-purple-500 py-3 font-bold">
        Sign In
      </button>
    </form>
  </div>
</main>
{% endblock %}
