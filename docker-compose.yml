services:
  between-us-api:
    build: .
    container_name: between-us-api
    restart: unless-stopped

    volumes:
      - ./instance:/app/instance

    environment:
      - FLASK_ENV=production

    labels:
      - "traefik.enable=true"

      # HTTP
      - "traefik.http.routers.between-us-api.rule=Host(`app.betweenus.fyi`)"
      - "traefik.http.routers.between-us-api.entrypoints=web"

      # HTTPS
      - "traefik.http.routers.between-us-api-secure.rule=Host(`app.betweenus.fyi`)"
      - "traefik.http.routers.between-us-api-secure.entrypoints=web"
     # - "traefik.http.routers.between-us-api-secure.tls=true"
     # - "traefik.http.routers.between-us-api-secure.tls.certresolver=letsencrypt"

      # Service
      - "traefik.http.services.between-us-api.loadbalancer.server.port=5000"

    networks:
      - traefik-net

networks:
  traefik-net:
    external: true